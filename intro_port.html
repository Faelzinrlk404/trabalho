<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA - BOOT SEQUENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; color: #00FF41; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .start-btn {
            background: none; border: 1px solid #00FF41; color: #00FF41;
            padding: 20px 40px; font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; cursor: pointer; transition: 0.3s;
            letter-spacing: 5px;
        }
        .start-btn:hover { background: #00FF41; color: #000; box-shadow: 0 0 20px #00FF41; }

        #boot-logs {
            width: 80%; max-width: 800px;
            font-size: 0.9rem; line-height: 1.5;
            display: none;
        }
        .log-line { opacity: 0; margin-bottom: 4px; }
        .log-success { color: #fff; font-weight: bold; }
        
        #welcome-screen {
            display: none;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
        }
        .welcome-text {
            font-size: 2.5rem; letter-spacing: 10px;
            text-transform: uppercase;
            animation: glitch 1s infinite alternate;
        }
        .sub-welcome { color: #555; margin-top: 15px; letter-spacing: 5px; }

        @keyframes glitch {
            0% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
            50% { text-shadow: -2px 0 0 red, 2px 0 0 blue; }
            100% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
        }

        .show { opacity: 1 !important; }
        .fade-out { opacity: 0; transition: 1s; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="startSystem()">INITIALIZE SYSTEM</button>
        <p style="margin-top: 20px; font-size: 0.7rem; opacity: 0.5;">CLIQUE PARA INICIAR O BOOT</p>
    </div>

    <audio id="type-sound">
        <source src="keyboard.mp3" type="audio/mpeg">
    </audio>

    <div id="boot-logs"></div>

    <div id="welcome-screen">
        <h1 class="welcome-text">BEM VINDO</h1>
        <h2 style="color:#fff; margin-top:10px;">PROF. LEANDRO & 9ºB</h2>
        <p class="sub-welcome">INICIANDO INTERFACE...</p>
    </div>

    <script>
        const logs = [
            "> INITIALIZING KERNEL v2.0.4...",
            "> MOUNTING SYSTEM MODULES... [OK]",
            "> CONNECTING TO DATABASE: 'PCD_HISTORY'...",
            "> SECURITY CHECK: BYPASSING ENCRYPTION...",
            "> LOADING ASSETS: VIDEO_PLAYER, UI_MODERN...",
            "> SYNCHRONIZING CLOUD DATA...",
            "> [SUCCESS] DATABASE CONNECTED.",
            "> PREPARING PRESENTATION INTERFACE...",
            "> OPTIMIZING RENDERING ENGINE...",
            "> SYSTEM READY. ACCESS GRANTED."
        ];

        const bootContainer = document.getElementById('boot-logs');
        const welcomeScreen = document.getElementById('welcome-screen');
        const startOverlay = document.getElementById('start-overlay');
        const typeSound = document.getElementById('type-sound');

        function startSystem() {
            typeSound.volume = 0.3; 
            startOverlay.style.display = 'none';
            bootContainer.style.display = 'block';
            
            typeSound.play();
            typeSound.loop = true;

            logs.forEach((text, i) => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = 'log-line show';
                    if (text.includes('[OK]') || text.includes('[SUCCESS]')) {
                        line.classList.add('log-success');
                    }
                    line.innerText = text;
                    bootContainer.appendChild(line);
                    window.scrollTo(0, document.body.scrollHeight);
                }, i * 700); 
            });

            // FIM DOS LOGS (8 segundos)
            setTimeout(() => {
                const fadeAudio = setInterval(() => {
                    if (typeSound.volume > 0.05) {
                        typeSound.volume -= 0.05;
                    } else {
                        typeSound.pause();
                        clearInterval(fadeAudio);
                    }
                }, 100);

                bootContainer.classList.add('fade-out');
                
                setTimeout(() => {
                    bootContainer.style.display = 'none';
                    welcomeScreen.style.display = 'block';
                    
                    // AQUI AUMENTAMOS PARA 8 SEGUNDOS (8000ms)
                    setTimeout(() => {
                        document.body.style.filter = "blur(30px)";
                        document.body.style.opacity = "0";
                        setTimeout(() => {
                            window.location.href = "timeline.html"; 
                        }, 1000);
                    }, 8000); // Antes era 4000
                }, 1000);
            }, 8000);
        }
    </script>
</body>
</html>
